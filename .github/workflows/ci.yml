---
name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - MAINTAINERS.md
      - LICENSE
      - NOTICE
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:

permissions:
  pull-requests: read
  contents: write
  packages: write

jobs:
  ci:
    # yamllint disable-line
    uses: xmidt-org/shared-go/.github/workflows/ci.yml@033446d5cadab01c9396852cada03720c3ff1815 # v4.12.9
    with:
      release-type:   library
      yaml-lint-skip: false
    secrets: inherit
